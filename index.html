<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Well Soon My Love ❤️</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff6a88,#ff99ac,#ffc3a0);
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

/* Floating hearts */

.heart{
position:absolute;
font-size:20px;
animation:float 7s linear infinite;
opacity:.8;
}

@keyframes float{
0%{transform:translateY(100vh) scale(.5);opacity:0;}
30%{opacity:1;}
100%{transform:translateY(-10vh) scale(1.3);opacity:0;}
}

/* Main card */

.card{
backdrop-filter:blur(12px);
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:25px;
width:90%;
max-width:520px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.25);
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 15px rgba(255,255,255,.4);}
to{box-shadow:0 0 35px rgba(255,255,255,.8);}
}

h1{
font-size:36px;
margin-bottom:10px;
}

#message{
font-size:20px;
line-height:1.7;
min-height:120px;
}

button{
margin-top:25px;
padding:14px 28px;
border:none;
border-radius:30px;
background:white;
color:#ff4b7d;
font-size:18px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

.love{
margin-top:15px;
font-size:24px;
display:none;
animation:fade 1s forwards;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<div class="card">

<h1>Get Well Soon ❤️</h1>

<p id="message"></p>

<button onclick="showLove()">Open My Heart 💌</button>

<div id="loveText" class="love">
Sending you endless hugs, kisses and love.  
Get well soon my beautiful ❤️
</div>

</div>

<script>

/* Typing effect */

const text = "Even when sickness makes you slow,My love for you continues to grow.Take some rest and close your eyes,Soon you’ll shine like the brightest skies.";

let i=0;

function typeWriter(){
if(i<text.length){
document.getElementById("message").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,40);
}
}

typeWriter();

/* Floating hearts */

function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*25)+"px";
heart.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},8000);
}

setInterval(createHeart,400);

/* Button action */

function showLove(){
document.getElementById("loveText").style.display="block";
}

</script>

</body>
</html>
