<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cozy Rain For You</title>
    <style>
        :root {
            --bg-warmth: #1a120c;
            --text-gold: #f4e1d2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-warmth);
            height: 100vh;
            overflow: hidden;
            font-family: 'Georgia', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* COZY BACKGROUND BEHIND THE FOG */
        .cozy-room {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #2c1e14 0%, #0c0806 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            z-index: 1;
        }

        .heart-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #d96c6c;
            animation: softGlow 2s infinite alternate;
        }

        .message {
            color: var(--text-gold);
            font-size: 1.2rem;
            line-height: 1.8;
            font-style: italic;
            max-width: 320px;
        }

        .footer-note {
            margin-top: 30px;
            font-family: 'Helvetica Neue', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(244, 225, 210, 0.4);
        }

        /* THE INTERACTIVE FOG CANVAS */
        #fog-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
            cursor: pointer;
        }

        @keyframes softGlow {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }
    </style>
</head>
<body>

   <div class="cozy-room">
    <div class="heart-icon">☕❤️</div>
    <p class="message">
        "If I were there, mon amour, I’d pull you close and never let go…<br>
        Just close your eyes, ma chérie <br> feel me there, softly holding you."
    </p>
</div>

    <canvas id="fog-canvas"></canvas>

    <script>
        const canvas = document.getElementById('fog-canvas');
        const ctx = canvas.getContext('2d');

        // Make canvas fill the screen
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Create a realistic window fog color (soft grayish-blue)
            ctx.fillStyle = 'rgba(210, 225, 235, 0.95)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Add instruction text on the fog
            ctx.font = 'italic 16px Georgia';
            ctx.fillStyle = '#5c7080';
            ctx.textAlign = 'center';
            ctx.fillText('Swipe to clear the window...', canvas.width / 2, canvas.height / 2);
        }

        initCanvas();
        window.onresize = initCanvas;

        // Function to wipe away fog
        function scratch(e) {
            const rect = canvas.getBoundingClientRect();
            // Support both mouse and touch events
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            // "Destination-out" turns the brush into an eraser
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 35, 0, Math.PI * 2); // 35 is the brush size
            ctx.fill();
        }

        // Event listeners for desktop and mobile
        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) scratch(e); // Only draw if left click is held
        });
        canvas.addEventListener('mousedown', scratch);

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); // Stop screen from scrolling while wiping
            scratch(e);
        });
        canvas.addEventListener('touchstart', scratch);
    </script>
</body>
</html>
