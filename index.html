<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Logic of Love | 2026</title>
    <style>
        :root {
            --gold: #FFD700;
            --wine: #722f37;
            --heart: #ff3e6b;
            --chalk: rgba(255, 255, 255, 0.9);
            --bg: #0d0d0d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--chalk);
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        /* MATH DECOR BACKGROUND */
        #bg-pattern {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.1;
            font-size: 0.8rem;
            pointer-events: none;
            padding: 20px;
            line-height: 2;
        }

        /* ANIMATION CONTAINER */
        #rhyme-box {
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .line-item {
            font-size: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* SPECIFIC STYLES */
        .drawing {
            height: 2px;
            width: 0;
            background: var(--gold);
            transition: width 1s ease;
        }

        .big-text {
            font-size: 4rem;
            font-weight: 900;
            display: block;
        }

        .heart {
            font-size: 5rem;
            color: var(--heart);
            filter: drop-shadow(0 0 15px var(--heart));
            animation: beat 0.8s infinite alternate;
        }

        @keyframes beat {
            to { transform: scale(1.2); }
        }

        /* ANIMATION CLASSES */
        .animate-in {
            animation: fadeIn 0.8s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .final-reveal {
            font-size: 2.5rem;
            color: var(--gold);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        #replay-btn {
            margin-top: 40px;
            background: none;
            border: 1px solid #333;
            color: #555;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div id="bg-pattern">
        y = mx + c <br>
        KAJAL = CONSTANT <br>
        NAMASVI = INFINITY <br>
        KAMILA = ABSOLUTE <br>
        ∫ Love dx = Everything
    </div>

    <div id="rhyme-box">
        <div class="line-item" id="item1">
            <div id="draw-line" class="drawing"></div>
            <p>This is a line.</p>
        </div>

        <div class="line-item" id="item2">
            <span class="big-text" style="color: var(--gold);">9</span>
            <p>This is nine.</p>
        </div>

        <div class="line-item" id="item3">
            <span class="big-text" style="color: var(--wine);">🍷</span>
            <p>This is wine.</p>
        </div>

        <div class="line-item" id="item4">
            <span class="heart">❤️</span>
            <p class="final-reveal">And you are mine.</p>
        </div>

        <button id="replay-btn" onclick="location.reload()">Replay Logic</button>
    </div>

    <script>
        window.onload = () => {
            const sequence = [
                { id: 'item1', delay: 500, callback: () => document.getElementById('draw-line').style.width = '150px' },
                { id: 'item2', delay: 2000 },
                { id: 'item3', delay: 3500 },
                { id: 'item4', delay: 5000 },
                { id: 'replay-btn', delay: 7000 }
            ];

            sequence.forEach(step => {
                setTimeout(() => {
                    const el = document.getElementById(step.id);
                    el.classList.add('animate-in');
                    if(step.callback) step.callback();
                    
                    // Small vibrate on each reveal
                    if(window.navigator.vibrate) window.navigator.vibrate(20);
                }, step.delay);
            });
        };
    </script>
</body>
</html>
