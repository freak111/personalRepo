<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feel Better, My Love</title>

<style>
:root {
    --bg: #040407;
    --rose: #ff8fa3;
    --gold: #ffd6a5;
    --soft: #ffe5ec;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: radial-gradient(circle at center, #0f0f1a, var(--bg));
    color: white;
    font-family: 'Georgia', serif;
    height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    text-align:center;
}

/* STARS */
#stars {
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}
.star {
    position:absolute;
    background:white;
    border-radius:50%;
    opacity:0.4;
}

/* MAIN */
.container {
    padding:20px;
    animation: fadeIn 1.5s ease;
}

h1 {
    font-size:0.8rem;
    letter-spacing:4px;
    opacity:0.6;
    margin-bottom:30px;
}

/* TOOTH / HEART */
.magic {
    font-size:5rem;
    cursor:pointer;
    animation: pulse 1.2s infinite alternate;
    filter: drop-shadow(0 0 20px #ff4d6d);
}

@keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.15); }
}

/* MESSAGE */
#message {
    display:none;
    max-width:320px;
    animation: fadeIn 1.5s ease forwards;
}

.text {
    font-size:1.2rem;
    line-height:1.8;
    color: var(--gold);
    font-style: italic;
}

/* HEART FLOAT */
.heart {
    position:absolute;
    color:var(--rose);
    font-size:1.2rem;
    opacity:0.7;
}

@keyframes float {
    from { transform: translateY(0) scale(1); opacity:1; }
    to { transform: translateY(-200px) scale(1.5); opacity:0; }
}

/* BUTTON */
.btn {
    margin-top:30px;
    padding:10px 20px;
    border-radius:30px;
    border:1px solid var(--rose);
    background:transparent;
    color:var(--rose);
    cursor:pointer;
    letter-spacing:2px;
    transition:0.3s;
}

.btn:hover {
    background:var(--rose);
    color:white;
    box-shadow:0 0 15px var(--rose);
}

/* ANIMATIONS */
@keyframes fadeIn {
    from { opacity:0; transform:translateY(20px); }
    to { opacity:1; transform:translateY(0); }
}

</style>
</head>

<body>

<div id="stars"></div>

<div class="container" id="main">
    <h1>MY FAVORITE PERSON HAVE TOOTH ACHE</h1>
    
    <div class="magic" onclick="heal(this)">🦷</div>
    
    <p style="margin-top:20px; font-size:0.7rem; opacity:0.5; letter-spacing:2px;">
        TAP ME GENTLY 💋
    </p>
</div>

<div id="message">
    <div style="font-size:3.5rem; margin-bottom:15px;">💖</div>

    <div class="text">
        If I could steal this pain from your lips,<br>
        I would kiss it away slowly… 💋<br><br>

        Every little ache you feel tonight,<br>
        somehow echoes inside me too…<br><br>

       Rest your smile, don’t feel alone,<br>
        My heart is where you call your home. ❤️<br>
    </div>

    <button class="btn" onclick="location.reload()">KISS AGAIN 💋</button>
</div>

<script>

/* STARS */
const starContainer = document.getElementById('stars');
for(let i=0;i<120;i++){
    let s = document.createElement('div');
    s.className = 'star';
    s.style.width = Math.random()*2 + 'px';
    s.style.height = s.style.width;
    s.style.left = Math.random()*100 + '%';
    s.style.top = Math.random()*100 + '%';
    starContainer.appendChild(s);
}

/* HEAL FUNCTION */
function heal(el){
    el.innerHTML = '💖';
    el.style.animation = 'none';
    el.style.filter = 'drop-shadow(0 0 25px #ff8fa3)';

    if(window.navigator.vibrate) window.navigator.vibrate([100,50,100]);

    /* hearts */
    for(let i=0;i<15;i++){
        createHeart();
    }

    setTimeout(()=>{
        document.getElementById('main').style.display='none';
        document.getElementById('message').style.display='block';
    },800);
}

/* HEART EFFECT */
function createHeart(){
    let h = document.createElement('div');
    h.className='heart';
    h.innerHTML='❤️';
    h.style.left='50%';
    h.style.top='50%';
    document.body.appendChild(h);

    let x = (Math.random()-0.5)*300;
    let y = -(Math.random()*300);

    h.animate([
        { transform:'translate(-50%, -50%) scale(0)', opacity:1 },
        { transform:`translate(${x}px, ${y}px) scale(1.5)`, opacity:0 }
    ],{
        duration:1500,
        easing:'ease-out',
        fill:'forwards'
    });

    setTimeout(()=>h.remove(),1500);
}

</script>

</body>
</html>
