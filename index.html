<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Kiss | 2026</title>
    <style>
        :root {
            --bg-deep: #050508;
            --girl: #ffafcc;
            --boy: #8ecae6;
            --love-red: #ff3366;
            --text-main: #f4e1d2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            position: relative;
        }

        /* --- THE SCENE GRID --- */
        .stage {
            position: relative;
            width: 100%;
            max-width: 350px;
            height: 300px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }

        /* --- CHARACTER AVATARS --- */
        .character {
            font-size: 5.5rem;
            position: relative;
            z-index: 10;
        }

        .label {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }

        .girl { color: var(--girl); filter: drop-shadow(0 0 10px rgba(255,175,204,0.3)); }
        .boy { color: var(--boy); filter: drop-shadow(0 0 10px rgba(142,202,230,0.3)); }

        /* --- THE BOY'S HEART (SMALL) --- */
        .heart-slot {
            position: absolute;
            font-size: 1.3rem;
            top: 10px; /* Over boy emoji */
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.05); /* initial faint */
            transition: color 0.3s ease;
        }

        /* small beating animation */
        .heart-slot.beating {
            color: var(--love-red);
            animation: beatSmall 0.8s infinite;
            filter: drop-shadow(0 0 8px var(--love-red));
        }

        /* --- THE TRAVELING KISS --- */
        .kiss {
            position: absolute;
            font-size: 1.4rem;
            color: var(--love-red);
            opacity: 0;
            z-index: 5;
            pointer-events: none;
            filter: drop-shadow(0 0 10px var(--love-red));
        }

        /* --- THE BIG HEART POPUP (FINAL REVEAL) --- */
        #final-overlay {
            display: none; /* hidden by default */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(5, 5, 8, 0.9); /* dims the screen */
            z-index: 50;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
            animation: fadeIn 1.5s forwards;
        }

        .big-heart {
            font-size: 100px;
            color: #ff8fa3; /* slightly softer pink-red */
            filter: drop-shadow(0 0 25px var(--love-red));
            animation: pulseHeart 1.5s infinite alternate 1.5s; /* starts after fade in */
        }

        .rhyme-box {
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 1.25rem;
            line-height: 1.8;
            color: #eee;
            margin-top: 25px;
            max-width: 320px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* --- START BUTTON --- */
        #start-btn {
            position: fixed;
            bottom: 100px;
            background: none;
            border: 2px solid var(--love-red);
            color: var(--love-red);
            padding: 12px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            z-index: 100;
        }

        #start-btn:active {
            background-color: var(--love-red);
            color: white;
            transform: scale(0.95);
        }

        /* === ANIMATIONS === */

        /* 1. Kiss flying from Girl to Boy's Heart slot */
        @keyframes flyKiss {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0.5);
            }
            10% {
                opacity: 1;
                transform: translate(15px, -10px) scale(1.1);
            }
            85% {
                opacity: 1;
                /* coordinates for boy's small heart position */
                transform: translate(185px, -40px) scale(1); 
            }
            100% {
                opacity: 0;
                transform: translate(210px, -50px) scale(0.7);
            }
        }

        /* 2. Girl "blowing" the kiss */
        @keyframes girlLean {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(12deg); }
        }

        /* 3. Small Heart beating */
        @keyframes beatSmall {
            0% { transform: translateX(-50%) scale(1); filter: drop-shadow(0 0 5px var(--love-red)); }
            15% { transform: translateX(-50%) scale(1.3); filter: drop-shadow(0 0 12px var(--love-red)); }
            30% { transform: translateX(-50%) scale(1); filter: drop-shadow(0 0 5px var(--love-red)); }
        }

        /* 4. Large Heart slow pulse */
        @keyframes pulseHeart {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.08); opacity: 1; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Animation classes toggled by JS */
        .animate-girl { animation: girlLean 0.5s ease; }
        .animate-kiss { animation: flyKiss 2s ease-out forwards; } /* Travel time */

    </style>
</head>
<body>

    <div class="stage" id="main-stage">
        <div class="character girl" id="girl-char">👩‍💼<span class="label">Kamila</span></div>
        
        <div class="kiss" id="flying-kiss">💋</div>

        <div class="character boy">
            👨‍⚖️
            <div class="heart-slot" id="boy-heart">❤️</div>
            <span class="label">Manish</span>
        </div>
    </div>

    <div id="final-overlay">
        <div class="big-heart">❤️</div>
        <div class="rhyme-box">
            "A single kiss, a gentle spark,<br>
            That flows directly to your heart.<br>
            It speaks a love, so soft and true,<br>
            A simple beat that's just for you."
        </div>
        <p onclick="location.reload()" style="margin-top: 40px; font-size: 0.65rem; opacity: 0.3; letter-spacing: 2px;">RESTART LOVE STORY</p>
    </div>

    <button id="start-btn" onclick="startSequence()">Start Story</button>

    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/audio/2023/10/06/audio_f503e9150b.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startSequence() {
            const girl = document.getElementById('girl-char');
            const kiss = document.getElementById('flying-kiss');
            const heart = document.getElementById('boy-heart');
            const overlay = document.getElementById('final-overlay');
            const btn = document.getElementById('start-btn');
            const music = document.getElementById('bg-music');

            // Hide button, try to play music (browsers require interaction first)
            btn.style.display = 'none';
            music.play().catch(e => console.log('Music blocked until click.'));
            
            // Reset animations
            void kiss.offsetWidth; 
            void girl.offsetWidth;
            heart.classList.remove('beating');

            // 1. Girl blows kiss
            girl.classList.add('animate-girl');

            // 2. Kiss appears and starts flying (slight delay)
            setTimeout(() => {
                kiss.classList.add('animate-kiss');
                if(window.navigator.vibrate) window.navigator.vibrate(20); 
            }, 300);

            // 3. Kiss reaches heart, small heart starts beating
            // (Delay = 0.3s starting delay + 2s travel time = 2.3s)
            setTimeout(() => {
                heart.classList.add('beating');
                kiss.classList.remove('animate-kiss'); 
                girl.classList.remove('animate-girl');
                
                if(window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]); 
            }, 2300); 

            // 4. BIG HEART POPUP (The final reveal)
            // (Give her a second to see the small heart beat before the big one appears)
            setTimeout(() => {
                overlay.style.display = 'flex';
                document.getElementById('main-stage').style.display = 'none';
                if(window.navigator.vibrate) window.navigator.vibrate(40);
            }, 3500); // 3.5 seconds total
        }
    </script>
</body>
</html>
