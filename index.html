<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What time is it?</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --accent: #ff8fa3;
            --text: #f4e1d2;
            --gold: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        /* --- INITIAL VIEW --- */
        #question-view {
            cursor: pointer;
            transition: all 0.5s ease;
        }

        #question-view h1 {
            font-size: 2rem;
            font-weight: 200;
            letter-spacing: 4px;
            border: 1px solid var(--accent);
            padding: 20px 40px;
            border-radius: 50px;
            color: var(--accent);
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 10px rgba(255, 143, 163, 0.2); }
            to { box-shadow: 0 0 30px rgba(255, 143, 163, 0.6); }
        }

        /* --- CLOCK VIEW --- */
        #clock-view {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1.5s ease forwards;
        }

        .clock-message {
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 1.5rem;
            margin-bottom: 40px;
            color: var(--accent);
        }

        .clock-face {
            width: 300px;
            height: 300px;
            border: 4px solid var(--text);
            border-radius: 50%;
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* The "Numbers" (Miss You) */
        .hour-text {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--text);
            padding: 10px;
            text-transform: uppercase;
        }

        /* Hands */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            border-radius: 10px;
            z-index: 10;
        }

        .hour-hand {
            width: 6px;
            height: 60px;
            background: var(--text);
        }

        .min-hand {
            width: 4px;
            height: 90px;
            background: var(--accent);
        }

        .sec-hand {
            width: 2px;
            height: 100px;
            background: var(--gold);
        }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background: var(--gold);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 11;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <!-- CLICKABLE INITIAL MESSAGE -->
    <div id="question-view" onclick="revealClock()">
        <h1>GUESS WHAT TIME IT IS?</h1>
    </div>

    <!-- REVEALED CLOCK SECTION -->
    <div id="clock-view">
        <h2 class="clock-message">It's "miss you" o'clock again! ❤️</h2>
        
        <div class="clock-face">
            <div class="center-dot"></div>
            
            <!-- Generate "Miss You" around the clock -->
            <div id="hour-labels"></div>

            <!-- Hands -->
            <div class="hand hour-hand" id="hour-hand"></div>
            <div class="hand min-hand" id="min-hand"></div>
            <div class="hand sec-hand" id="sec-hand"></div>
        </div>

        <p style="margin-top: 40px; opacity: 0.4; font-size: 0.8rem; letter-spacing: 2px;">
            EVERY SECOND, EVERY MINUTE.
        </p>
    </div>

    <script>
        // 1. Position the "MISS YOU" text around the circle
        const labelsContainer = document.getElementById('hour-labels');
        for (let i = 1; i <= 12; i++) {
            const el = document.createElement('div');
            el.className = 'hour-text';
            el.innerHTML = 'MISS YOU';
            // Each hour is 30 degrees (360/12)
            el.style.transform = `rotate(${i * 30}deg)`;
            labelsContainer.appendChild(el);
        }

        function revealClock() {
            document.getElementById('question-view').style.display = 'none';
            document.getElementById('clock-view').style.display = 'flex';
            
            if(window.navigator.vibrate) window.navigator.vibrate([50, 50, 50]);
            
            // Start the clock movement
            startClock();
        }

        function startClock() {
            const hourHand = document.getElementById('hour-hand');
            const minHand = document.getElementById('min-hand');
            const secHand = document.getElementById('sec-hand');

            function update() {
                const now = new Date();
                
                const seconds = now.getSeconds();
                const secDegrees = (seconds / 60) * 360;
                secHand.style.transform = `translateX(-50%) rotate(${secDegrees}deg)`;

                const minutes = now.getMinutes();
                const minDegrees = (minutes / 60) * 360 + (seconds / 60) * 6;
                minHand.style.transform = `translateX(-50%) rotate(${minDegrees}deg)`;

                const hours = now.getHours();
                const hourDegrees = (hours / 12) * 360 + (minutes / 60) * 30;
                hourHand.style.transform = `translateX(-50%) rotate(${hourDegrees}deg)`;
            }

            setInterval(update, 1000);
            update(); // Initial call
        }
    </script>
</body>
</html>
