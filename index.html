<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Night ❤️</title>

<style>

:root{
--bg1:#0b0c2a;
--bg2:#1a1b4b;
--moon:#ffd700;
--text:#ffffff;
--pink:#ff6b9a;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(180deg,var(--bg1),var(--bg2));
color:var(--text);
font-family:Georgia,serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

/* stars */

#stars{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:.7;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2}
to{opacity:1}
}

/* moon */

.moon{
font-size:60px;
margin-bottom:15px;
filter:drop-shadow(0 0 20px var(--moon));
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* card */

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:25px 20px;
border-radius:20px;
max-width:320px;
box-shadow:0 10px 30px rgba(0,0,0,.5);
}

/* text */

h1{
font-size:22px;
margin-bottom:10px;
color:var(--moon);
}

.message{
font-size:15px;
line-height:1.7;
margin-top:10px;
}

/* heart */

.heart{
font-size:30px;
margin-top:15px;
animation:pulse 1.3s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* floating hearts */

.float-heart{
position:absolute;
bottom:-20px;
font-size:14px;
animation:rise 6s linear forwards;
}

@keyframes rise{
0%{transform:translateY(0);opacity:0}
20%{opacity:1}
100%{transform:translateY(-110vh);opacity:0}
}

</style>
</head>

<body>

<div id="stars"></div>

<div class="card">

<div class="moon">🌙</div>

<h1>Good Night My Love</h1>

<div class="message">

As the night wraps the world in silence,<br>
I just want you to know…<br><br>

No matter how far or close we are,<br>
you’re always in my heart 💖<br><br>

Sleep peacefully, dream beautifully,<br>
and wake up with that cute smile I love 😊<br><br>

Good night… my favorite person 🌙

</div>

<div class="heart">❤️</div>

</div>

<script>

/* create stars */

for(let i=0;i<80;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.animationDuration=(1+Math.random()*2)+"s";
document.getElementById("stars").appendChild(s);
}

/* floating hearts */

function heart(){
let h=document.createElement("div");
h.className="float-heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
}

setInterval(heart,1000);

</script>

</body>
</html>
