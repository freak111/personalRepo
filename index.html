<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your Name in My Heart | 2026</title>
    <style>
        :root {
            --holi-pink: #ff007f;
            --holi-yellow: #ffee00;
            --holi-blue: #00d4ff;
            --bg: #0d0118;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 20px;
        }

        /* 1. THE HEART BUTTON */
        .heart-trigger {
            font-size: 120px;
            cursor: pointer;
            display: inline-block;
            animation: pulse 1s infinite alternate;
            filter: drop-shadow(0 0 30px var(--holi-pink));
            transition: transform 0.5s ease;
        }

        @keyframes pulse {
            to { transform: scale(1.1); filter: drop-shadow(0 0 50px var(--holi-pink)); }
        }

        .question-text {
            font-size: 1.8rem;
            font-weight: 800;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: opacity 0.5s;
        }

        /* 2. THE FINAL REVEAL TEXT */
        #final-reveal {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            display: none;
            flex-direction: column;
            pointer-events: none;
        }

        .big-name {
            font-size: 16vw;
            font-weight: 900;
            line-height: 0.9;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes popName {
            to { opacity: 1; transform: scale(1); }
        }

        .sub-wish {
            margin-top: 20px;
            font-size: 1.2rem;
            font-style: italic;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            display: inline-block;
            align-self: center;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui-layer">
        <div id="initial-state">
            <div class="heart-trigger" onclick="startExplosion()">❤️</div>
            <p class="question-text">Who is my everything?</p>
            <p style="opacity: 0.5; margin-top: 10px;">(Tap the heart)</p>
        </div>
    </div>

    <div id="final-reveal">
        <div class="big-name" id="n1" style="color: var(--holi-pink);">KAAJAL</div>
        <div class="big-name" id="n2" style="color: var(--holi-yellow);">NAMASVI</div>
        <div class="big-name" id="n3" style="color: var(--holi-blue);">KAMILA</div>
        <p class="sub-wish">"Every heart beats only for you."</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const names = ["Kaajal", "Namasvi", "Kamila"];
        const colors = ['#ff007f', '#ffee00', '#00d4ff', '#9d00ff'];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class NameHeart {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.name = names[Math.floor(Math.random() * names.length)];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.size = Math.random() * 30 + 40; // Size of the heart
                this.speedX = (Math.random() - 0.5) * 12;
                this.speedY = (Math.random() - 0.5) * 12;
                this.gravity = 0.05;
                this.opacity = 1;
                this.angle = Math.random() * Math.PI * 2;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.globalAlpha = this.opacity;
                
                // Draw Heart
                ctx.fillStyle = this.color;
                ctx.beginPath();
                const d = this.size;
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-d / 2, -d / 2, -d, d / 3, 0, d);
                ctx.bezierCurveTo(d, d / 3, d / 2, -d / 2, 0, 0);
                ctx.fill();

                // Draw Name inside Heart
                ctx.fillStyle = "#000"; // Black text for contrast
                ctx.font = `bold ${this.size/4}px Arial`;
                ctx.textAlign = "center";
                ctx.fillText(this.name, 0, d/2.5);
                
                ctx.restore();
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.opacity -= 0.007;
                this.angle += 0.02;
            }
        }

        function startExplosion() {
            // Hide UI
            document.getElementById('initial-state').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('initial-state').style.display = 'none';
                document.getElementById('final-reveal').style.display = 'flex';
                // Pop the big names
                document.getElementById('n1').style.animation = "popName 0.5s forwards 0.2s";
                document.getElementById('n2').style.animation = "popName 0.5s forwards 0.5s";
                document.getElementById('n3').style.animation = "popName 0.5s forwards 0.8s";
            }, 500);

            // Create 100 Hearts with names
            for (let i = 0; i < 120; i++) {
                setTimeout(() => {
                    particles.push(new NameHeart());
                }, i * 10);
            }
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].opacity <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
