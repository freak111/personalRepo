<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suno...</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #333333;
            --text-main: #ffffff;
            --accent-red: #ff4d4d;
            --bear-brown: #8d6e63;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Quicksand', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
        }

        .card {
            text-align: center;
            max-width: 400px;
            padding: 20px;
        }

        /* --- TEXT STYLES --- */
        .header {
            color: var(--accent-red);
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subheader {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        /* --- VISUAL ELEMENTS --- */
        .illustration-container {
            position: relative;
            font-size: 120px; /* Base size for emojis */
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bear {
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }

        .ladder {
            position: absolute;
            font-size: 80px;
            right: 40px;
            bottom: -10px;
            z-index: 1;
            transform: rotate(5deg);
            animation: wobble 3s infinite ease-in-out;
        }

        .like-overlay {
            position: absolute;
            z-index: 3;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 5px 15px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            font-weight: 700;
            border: 1px solid rgba(255,255,255,0.2);
            animation: pulse 2s infinite;
        }

        .footer-text {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.4;
            padding: 0 20px;
        }

        /* --- ANIMATIONS --- */
        @keyframes wobble {
            0%, 100% { transform: rotate(5deg); }
            50% { transform: rotate(10deg); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 480px) {
            .header { font-size: 2rem; }
            .subheader { font-size: 1.2rem; }
            .footer-text { font-size: 1.3rem; }
            .illustration-container { font-size: 100px; }
            .ladder { font-size: 130px; right: 60px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 class="header">"SUNO"</h1>
        <p class="subheader">apke dil me utarna hai</p>

        <div class="illustration-container">
           
            <div class="bear">🧸</div>
            <div class="ladder">🪜</div>
        </div>

        <p class="footer-text">
            Sirhi thik hai ke<br>
            sidha kud jau 🙈
        </p>
    </div>

</body>
</html>
